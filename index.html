<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just Type </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
         <nav class="navbar">
         <div class="logo">
            KEYSTROKE
         </div>
<div class="nav-links">
            <a href="#">CODE</a>
            <a href="#">TEXT</a>
            <a href="#">CUSTOM</a>
         </div>
         <div class="nav-icon">
    |||
  </div>
         </nav>

<section class="stats">
    <div class="stat-box">
        <h1>82</h1>
        <p>WPM</p>
    </div>
    <div class="stat-box">
        <h1>96%</h1>
        <p>ACCURACY</p>
    </div>
    <div class="stat-box">
        <h1>45s</h1>
        <p>TIME</p>
    </div>
    <div class="stat-box">
        <h1>3</h1>
        <p>ERRORS</p>
    </div>
</section>

 <section class="filters">
    <div class="filters-group">
        <span class="filter-title">LANGUAGES</span>
        <button class="filter-btn">.js</button>
        <button class="filter-btn">.java</button>
        <button class="filter-btn">.py</button>
        <button class="filter-btn">.cpp</button>
        </div>
        <div class="filter-group">

        <span class="filter-title">
            DIFFICULTY
        </span>

        <button class="filter-btn">EASY</button>
        <button class="filter-btn">HARD</button>

    </div>
        </div>
 </section>

<section class="typing-section">

    <div class="typing-box">

        <div class="line-numbers">

            <span>1</span>
            <span>2</span>
            <span>3</span>
            <span>4</span>

        </div>

        <div class="code-area">

            <p>
                <span class="typed">
                    const
                </span>

                <span class="active-letter">
                    a
                </span>

                dd = (a,b) => a + b;
            </p>

            <p>
                function greet(){
            </p>

            <p>
                &nbsp;&nbsp;console.log("hello");
            </p>

            <p>
                }
            </p>

        </div>

    </div>

</section>

    <section class="bottom-controls">
    </section>


    </div>







    
    <script src="uhh.js"></script>
</body>
</html>
